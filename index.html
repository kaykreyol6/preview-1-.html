<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Life Admin</title>

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  background: linear-gradient(135deg, #4f46e5, #9333ea, #ec4899);
  color: white;
  padding: 20px;
}

.container {
  max-width: 900px;
  margin: auto;
}

.header {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(15px);
  border-radius: 20px;
  padding: 20px;
}

.header-top {
  display: flex;
  align-items: center;
  gap: 15px;
}

.logo {
  font-size: 50px;
}

.title {
  font-size: 40px;
  margin: 0;
}

.buttons {
  margin-top: 15px;
  display: flex;
  gap: 10px;
}

button {
  padding: 10px 15px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

.voice {
  background: linear-gradient(to right, pink, red, orange);
  color: white;
}

.connect {
  background: linear-gradient(to right, indigo, purple, blue);
  color: white;
}

.calendar {
  background: rgba(255,255,255,0.2);
  border-radius: 20px;
  padding: 20px;
  margin-top: 20px;
}

.calendar-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 8px;
  margin-top: 10px;
}

.day {
  background: white;
  color: black;
  padding: 10px;
  text-align: center;
  border-radius: 10px;
  cursor: pointer;
}

.high { background: red; color: white; }
.medium { background: yellow; }
.low { background: lightgreen; }

.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  display: none;
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: white;
  color: black;
  padding: 20px;
  border-radius: 15px;
  width: 400px;
}

.email {
  background: #eee;
  padding: 10px;
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
}

.cancel {
  background: red;
  color: white;
}
</style>
</head>

<body>

<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="header-top">
      <div class="logo">🐷</div>
      <h1 class="title">Life Admin</h1>
    </div>

    <p>Track subscriptions, avoid charges, and stay in control.</p>

    <div class="buttons">
      <button class="voice">🎤 Voice</button>
      <button class="connect" onclick="openEmailPage()">📧 Connect Email</button>
    </div>
  </div>

  <!-- Calendar -->
  <div class="calendar">
    <div class="calendar-header">
      <button onclick="changeMonth(-1)">◀</button>
      <h2 id="month"></h2>
      <button onclick="changeMonth(1)">▶</button>
    </div>

    <div class="grid" id="calendar"></div>
  </div>

</div>

<!-- Email Modal -->
<div class="modal" id="emailModal">
  <div class="modal-content">
    <h2>Your Emails</h2>

    <div id="emails"></div>

    <button onclick="closeEmail()">Close</button>
  </div>
</div>

<script>
const emails = [
  {subject:"Netflix trial ends tomorrow", date:"2026-03-12", risk:"high"},
  {subject:"Spotify subscription renewal", date:"2026-03-18", risk:"medium"},
  {subject:"Amazon Prime active subscription", date:"2026-03-22", risk:"low"}
];

let currentMonth = new Date().getMonth();
let currentYear = new Date().getFullYear();

function renderCalendar(){
  const grid = document.getElementById("calendar");
  grid.innerHTML = "";

  const firstDay = new Date(currentYear, currentMonth,1).getDay();
  const days = new Date(currentYear, currentMonth+1,0).getDate();

  document.getElementById("month").innerText =
    new Date(currentYear,currentMonth).toLocaleString('default',{month:'long'}) + " " + currentYear;

  for(let i=0;i<firstDay;i++){
    grid.innerHTML += "<div></div>";
  }

  for(let i=1;i<=days;i++){
    let email = emails.find(e=> new Date(e.date).getDate()===i);

    let cls = "day";
    if(email) cls += " " + email.risk;

    grid.innerHTML += `<div class="${cls}" onclick="openEmailPage()">${i}</div>`;
  }
}

function changeMonth(dir){
  currentMonth += dir;
  if(currentMonth<0){currentMonth=11; currentYear--;}
  if(currentMonth>11){currentMonth=0; currentYear++;}
  renderCalendar();
}

function openEmailPage(){
  document.getElementById("emailModal").style.display="flex";

  const container = document.getElementById("emails");
  container.innerHTML="";

  emails.forEach(e=>{
    container.innerHTML += `
      <div class="email">
        <div>
          <b>${e.subject}</b><br>
          ${new Date(e.date).toDateString()}
        </div>
        <button class="cancel">Cancel</button>
      </div>
    `;
  });
}

function closeEmail(){
  document.getElementById("emailModal").style.display="none";
}

renderCalendar();
</script>

</body>
</html>
